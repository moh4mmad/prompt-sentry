services:
  postgres:
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}

  api:
    cap_drop: ["ALL"]
    pids_limit: 256
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    environment:
      APP_ENVIRONMENT: production
      DOCS_ENABLED: "false"
      ENABLE_HSTS: "true"
      API_KEY: ${API_KEY:?API_KEY is required}
      DASHBOARD_API_KEY: ${DASHBOARD_API_KEY:?DASHBOARD_API_KEY is required}
      DATABASE_URL: postgresql://prompt_sentry:${POSTGRES_PASSWORD}@postgres:5432/prompt_sentry
      REDIS_URL: redis://redis:6379/0
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      TRUSTED_PROXY_CIDRS: ${TRUSTED_PROXY_CIDRS:-}

  dashboard:
    cap_drop: ["ALL"]
    pids_limit: 256
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    environment:
      PROMPT_SENTRY_API_KEY: ${API_KEY}
      DASHBOARD_API_KEY: ${DASHBOARD_API_KEY}
      DASHBOARD_USERNAME: ${DASHBOARD_USERNAME:?DASHBOARD_USERNAME is required}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD:?DASHBOARD_PASSWORD is required}
