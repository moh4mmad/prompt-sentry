services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: prompt_sentry
      POSTGRES_USER: prompt_sentry
      POSTGRES_PASSWORD: local-development-only
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prompt_sentry -d prompt_sentry"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "noeviction"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8100:8100"
    environment:
      PROMPT_SENTRY_MODE: protect
      AUDIT_LOG_SINK: postgres
      DATABASE_URL: postgresql://prompt_sentry:local-development-only@postgres:5432/prompt_sentry
      RATE_LIMIT_BACKEND: redis
      REDIS_URL: redis://redis:6379/0
      DASHBOARD_API_KEY: local-dashboard-key
      AUDIT_INCLUDE_REDACTED_INPUT: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8100/ready')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_DOCS_URL: http://localhost:8100/docs
    ports:
      - "3100:3100"
    environment:
      PROMPT_SENTRY_API_URL: http://api:8100
      DASHBOARD_API_KEY: local-dashboard-key
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:3100/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
